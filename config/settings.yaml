# 파일 경로: config/settings.yaml

project:
  home: "C:/Users/tlfps/IdeaProjects/portal" # 슬래시로 변경 완료
  base_package: "com.demo.portal.api" # 도메인 모듈이 생성될 위치
  common_package: "com.demo.portal.common" # 공통 클래스(BaseEntity 등)가 있는 위치 (추가!)

# ---------------------------------------------------------
# 1. PostgreSQL 사용 시 설정 (현재 활성화됨)
# ---------------------------------------------------------
db_config:
  type: "postgresql"
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "demo2026!"
  database: "postgres"

run:
  schema: "portal"
  target_tables: [] # 값이 비어있으면 전체, 테이블명이 들어있으면 해당 entity만 생성
  target_domain: [] # 값이 비어있으면 전체, domain이 들어있으면 해당 Domain Entity만 생성

# ---------------------------------------------------------
# 2. Oracle 사용 시 설정 예시 (사용 시 위 설정을 지우거나 주석 처리하고 아래를 해제하세요)
# ---------------------------------------------------------
# db_config:
#   type: "oracle"
#   host: "localhost"
#   port: 1521                  # 오라클 기본 포트
#   user: "c##portal"           # 오라클 접속 계정 (12c 이상에서는 c## 접두사 사용 등 환경에 맞게 작성)
#   password: "demo2026!"       # 계정 비밀번호
