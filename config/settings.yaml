#
# run:
#   schema: "C##PORTAL"         # 오라클은 일반적으로 접속 계정명이 스키마명입니다. (대문자 권장)
#   target_tables: [ ]

# ---------------------------------------------------------
# 3. MySQL / MariaDB 사용 시 설정 예시 (사용 시 위 설정을 지우거나 주석 처리하고 아래를 해제하세요)
# ---------------------------------------------------------
